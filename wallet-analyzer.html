<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Cluster Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0a0a0f;color:#c8d3e0;font-size:13px;line-height:1.6}
:root{--green:#00ff9d;--blue:#4fa3ff;--amber:#ffb347;--red:#ff4d6a;--dim:#3a4a5a;--border:#1e2d3d;--bg2:#0f1923;--bg3:#141f2e}
h1{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--green);text-transform:uppercase}
h2{font-size:12px;font-weight:700;letter-spacing:1px;color:#7a9ab8;text-transform:uppercase;margin-bottom:8px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:12px 16px;margin-bottom:12px}
.chain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ci{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s}
.ci:hover{border-color:var(--dim)}.ci.on{border-color:var(--green)}.ci.on .cdot{background:var(--green)}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.cname{font-size:12px;font-weight:700}.csub{font-size:10px;color:#4a6a8a}
input[type=text],input[type=password],input[type=number]{background:#07101a;border:1px solid var(--border);border-radius:3px;color:#c8d3e0;font-family:'Courier New',monospace;font-size:11px;padding:5px 8px;width:100%;outline:none;transition:border-color .15s}
input:focus{border-color:var(--blue)}
select{background:#07101a;border:1px solid var(--border);border-radius:3px;color:#c8d3e0;font-family:'Courier New',monospace;font-size:11px;padding:5px 6px;outline:none}
.btn{background:transparent;border:1px solid var(--green);color:var(--green);font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:1px;padding:8px 20px;cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase}
.btn:hover:not(:disabled){background:rgba(0,255,157,.08)}.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.red{border-color:var(--red);color:var(--red)}.btn.red:hover:not(:disabled){background:rgba(255,77,106,.08)}
.btn.dim{border-color:var(--dim);color:#7a9ab8;font-size:11px;padding:5px 12px}
#log{background:#050d15;border:1px solid var(--border);border-radius:3px;height:220px;overflow-y:auto;padding:8px;font-size:10px;line-height:1.9}
.ll{display:flex;gap:8px}.lt{color:#1e3a5a;flex-shrink:0;width:62px}.lm{color:#6a8aa0}
.lm.ok{color:var(--green)}.lm.warn{color:var(--amber)}.lm.err{color:var(--red)}.lm.info{color:var(--blue)}.lm.dim{color:#2a4a6a}
.rw{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{position:sticky;top:0;background:var(--bg2);z-index:1}
th{color:#4a6a8a;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:7px 8px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:5px 8px;border-bottom:1px solid #0a1520;vertical-align:middle;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.01)}
.tag{display:inline-block;border-radius:2px;font-size:9px;font-weight:700;padding:1px 5px;letter-spacing:.5px}
.tag.seed{background:rgba(79,163,255,.12);color:var(--blue);border:1px solid rgba(79,163,255,.2)}
.tag.new{background:rgba(0,255,157,.1);color:var(--green);border:1px solid rgba(0,255,157,.18)}
.tag.exch{background:rgba(255,179,71,.12);color:var(--amber);border:1px solid rgba(255,179,71,.2)}
a{color:var(--blue);text-decoration:none;font-size:10px}a:hover{text-decoration:underline}
.sr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.sv{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:8px 14px;min-width:90px}
.svv{font-size:22px;font-weight:700;color:var(--green)}.svk{font-size:9px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pb{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin:8px 0}
.pf{height:100%;background:var(--green);transition:width .3s;border-radius:1px}
.al{max-height:140px;overflow-y:auto;background:#050d15;border:1px solid var(--border);border-radius:3px;padding:6px 8px;font-size:10px;line-height:1.9;color:#3a6a9a}
.bdg{display:inline-block;background:rgba(255,179,71,.15);color:var(--amber);border-radius:2px;font-size:9px;padding:1px 5px;font-weight:700}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.snum{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:#4a6a8a;transition:all .2s}
.snum.act{border-color:var(--amber);color:var(--amber);animation:pulse 1s infinite}
.snum.done{border-color:var(--green);color:var(--green);background:rgba(0,255,157,.06)}
.slbl{font-size:11px;color:#6a8aa0;padding-top:3px;transition:color .2s}
.slbl.act{color:#c8d3e0;font-weight:700}.slbl.done{color:var(--green)}
.srow{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
</style>
</head>
<body>
<div style="max-width:980px;margin:0 auto;padding:16px">

<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:16px">
  <h1>⬡ Wallet Cluster Analyzer</h1>
  <span style="font-size:10px;color:#1e3a5a">v9.0 · Arkham Intelligence API · 재설계</span>
</div>

<!-- API 설정 -->
<div class="panel">
  <div style="background:#060e18;border:1px solid rgba(255,179,71,.28);border-radius:4px;padding:12px 14px">
    <div style="font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.5px;margin-bottom:8px">⬡ ARKHAM INTELLIGENCE API</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:11px;color:#7a9ab8;width:80px;flex-shrink:0">API Key</span>
      <input type="password" id="api-key" placeholder="platform.arkhamintelligence.com/settings/api" style="font-size:12px">
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:#7a9ab8;width:80px;flex-shrink:0">프록시 URL</span>
      <input type="text" id="proxy-url" placeholder="https://walo.onrender.com (비우면 직접 연결)">
    </div>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;align-items:center">
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:10px;color:#7a9ab8">조회 기간</span>
      <select id="time-last">
        <option value="90d">3개월</option>
        <option value="180d">6개월</option>
        <option value="1y" selected>1년</option>
        <option value="2y">2년</option>
        <option value="">전체</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:10px;color:#7a9ab8">최소 입금 USD</span>
      <input type="number" id="usd-gte" value="1" min="0" style="width:70px">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:10px;color:#7a9ab8">입금주소 최대 발신자</span>
      <input type="number" id="max-senders" value="30" min="5" max="200" style="width:70px">
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:10px;color:#7a9ab8">RPM</span>
      <select id="rpm">
        <option value="20">20</option>
        <option value="40">40</option>
        <option value="60" selected>60</option>
      </select>
    </div>
  </div>
</div>

<!-- 체인 선택 -->
<div class="panel">
  <h2>체인 선택</h2>
  <div class="chain-grid" id="chain-grid"></div>
</div>

<!-- 시드 주소 -->
<div class="panel">
  <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="toggleSeed()">
    <span style="color:var(--blue)">◈</span>
    <h2 style="margin:0">시드 주소 &nbsp;<span class="bdg" id="seed-count">0</span></h2>
    <span id="seed-toggle" style="margin-left:auto;color:#2a4a6a;font-size:10px">▼ expand</span>
  </div>
  <div id="seed-panel" style="display:none;margin-top:12px">
    <div class="al" id="seed-list"></div>
    <div style="margin-top:8px;display:flex;gap:8px">
      <input type="text" id="add-addr" placeholder="추가 (0x...)">
      <button class="btn dim" onclick="addSeed()">+ 추가</button>
      <button class="btn dim red" onclick="resetSeeds()">↺ 초기화</button>
    </div>
  </div>
</div>

<!-- 컨트롤 -->
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
  <button class="btn" id="btn-start" onclick="run()">▶ 분석 시작</button>
  <button class="btn red" id="btn-stop" onclick="stop()" disabled>■ 중지</button>
  <button class="btn dim" onclick="exportCSV()">↓ CSV</button>
  <button class="btn dim" onclick="exportReport()">↓ 리포트</button>
  <button class="btn dim" onclick="clearLog()">로그 초기화</button>
  <span style="margin-left:auto;font-size:10px;color:#1e3a5a" id="status-lbl"></span>
</div>
<div class="pb"><div class="pf" id="pbar" style="width:0%"></div></div>

<!-- 통계 -->
<div class="sr">
  <div class="sv"><div class="svv" id="s-api">0</div><div class="svk">API 호출</div></div>
  <div class="sv"><div class="svv" id="s-dep">0</div><div class="svk">입금주소</div></div>
  <div class="sv"><div class="svv" id="s-edge">0</div><div class="svk">엣지(연결)</div></div>
  <div class="sv"><div class="svv" id="s-cluster">0</div><div class="svk">클러스터</div></div>
  <div class="sv"><div class="svv" id="s-wallet">0</div><div class="svk">발견 지갑</div></div>
</div>

<!-- 파이프라인 -->
<div class="panel">
  <h2>파이프라인</h2>
  <div id="step-list"></div>
</div>

<!-- 로그 -->
<div class="panel" style="padding:10px 12px">
  <h2>실시간 로그</h2>
  <div id="log"></div>
</div>

<!-- 결과 테이블 -->
<div class="panel">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
    <h2 style="margin:0">결과 <span class="bdg" id="res-count">0</span></h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <input type="text" id="f-wallet" placeholder="지갑" style="width:130px" oninput="renderTable()">
      <input type="text" id="f-exch" placeholder="거래소" style="width:100px" oninput="renderTable()">
      <input type="text" id="f-cluster" placeholder="클러스터" style="width:80px" oninput="renderTable()">
    </div>
  </div>
  <div class="rw">
    <table>
      <thead><tr>
        <th>클러스터</th><th>지갑</th><th>이름</th><th>구분</th>
        <th>입금주소</th><th>거래소</th><th>체인</th><th>USD</th>
        <th>링크</th>
      </tr></thead>
      <tbody id="res-body"></tbody>
    </table>
    <div id="no-res" style="text-align:center;padding:32px;color:#1e3a5a;font-size:11px">분석 시작 후 결과가 표시됩니다</div>
  </div>
</div>

</div>

  'bitfinex','bitstamp','htx','bitmart','phemex','gemini','bittrex','poloniex']);

// 반환: 'exchange' | 'individual' | 'contract' | 'entity' | 'unknown'
function classify(obj) {
  if (!obj) return 'unknown';
  if (obj.contract || obj.isContract) return 'contract';

  const label = ((obj.arkhamLabel?.name) || '').toLowerCase();
  const ename = ((obj.arkhamEntity?.name || obj.arkhamEntity?.id)
               || (obj.predictedEntity?.name || obj.predictedEntity?.id) || '').toLowerCase();
  const etype = (obj.arkhamEntity?.type || obj.predictedEntity?.type || '').toLowerCase();

  // DEX/bridge/non-cex 타입 → 즉시 제외
  if (NON_CEX_TYPES.has(etype)) return 'entity';

  // 거래소 판별
  const isCexType = etype === 'exchange' || etype === 'cex';
  const hasCexName = [...CEX_NAMES].some(k => label.includes(k) || ename.includes(k));
  const hasDepositLabel = label.includes('deposit');
  const hasHotCold = label.includes('hot wallet') || label.includes('cold wallet');
  const hasDepositId = obj.depositServiceID &&
    [...CEX_NAMES].some(k => obj.depositServiceID.toLowerCase().includes(k));

  if (hasDepositId) return 'exchange';
  if (isCexType) return 'exchange';
  if (hasCexName && (hasDepositLabel || hasHotCold)) return 'exchange';

  // 핫/콜드 월렛 라벨
  if (hasHotCold) return 'exchange';

  // Arkham이 식별한 알려진 entity (whale, fund, protocol 등)
  if (obj.arkhamEntity?.id) return 'entity';

  return 'unknown'; // 개인 지갑으로 간주
}

function entName(obj) {
  if (!obj) return '';
  return obj.arkhamLabel?.name
    || obj.arkhamEntity?.name || obj.arkhamEntity?.id
    || obj.predictedEntity?.name || '';
}

// ── Rate Limiter ──────────────────────────────────────────────────────
class RateLimiter {
  constructor(rpm) { this.rpm = rpm; this.queue = []; this.running = false; }
  setRpm(rpm) { this.rpm = rpm; }
  async call(fn) {
    return new Promise((res, rej) => {
      this.queue.push({fn, res, rej});
      if (!this.running) this._run();
    });
  }
  async _run() {
    this.running = true;
    while (this.queue.length) {
      const {fn, res, rej} = this.queue.shift();
      const gap = 60000 / this.rpm;
      const wait = Math.max(0, gap - (Date.now() - lastCallTime));
      if (wait) await sleep(wait);
      lastCallTime = Date.now();
      try { res(await fn()); } catch(e) { rej(e); }
    }
    this.running = false;
  }
}

// ── Arkham API 호출 ───────────────────────────────────────────────────
async function arkFetch(path, params, opts) {
  const base = opts.proxyUrl || 'https://api.arkhamintelligence.com';
  const qs = new URLSearchParams(params).toString();
  const url = `${base}${path}${qs ? '?' + qs : ''}`;

  return limiter.call(async () => {
    if (aborted) throw new Error('중지됨');
    apiCalls++;
    updateStats();

    const resp = await fetch(url, { headers: { 'API-Key': opts.apiKey } });
    if (resp.status === 429) {
      log('⚠ 429 Rate limit — 61초 대기', 'warn');
      await sleep(61000);
      return arkFetch(path, params, opts);
    }
    if (!resp.ok) {
      const txt = await resp.text().catch(() => '');
      throw new Error(`HTTP ${resp.status} — ${txt.slice(0, 120)}`);
    }
    return resp.json();
  });
}

// 단일 페이지 전송 / 전체 페이지네이션
async function fetchAll(address, flow, extraParams, opts, onPage) {
  const txs = [];
  let offset = 0, page = 0;
  while (!aborted) {
    const params = {
      base: address, flow, limit: 100, offset,
      sortKey: 'time', sortDir: 'desc',
      ...extraParams,
    };
    if (opts.chains.length) params.chain = opts.chains.join(',');
    if (opts.timeLast) params.timeLast = opts.timeLast;
    if (opts.usdGte) params.usdGte = opts.usdGte;

    let data;
    try { data = await arkFetch('/transfers', params, opts); }
    catch(e) {
      if (String(e).includes('offset + limit')) break; // 10000 한도
      log(`⚠ ${short(address)} 오류: ${e.message}`, 'warn');
      break;
    }
    const batch = data.transfers || [];
    txs.push(...batch);
    page++;
    if (onPage) onPage(page, batch.length, txs.length);
    if (batch.length < 100) break;
    offset += 100;
  }
  return txs;
}

async function run() {
  const opts = readOpts();
  if (!opts.apiKey) { log('⚠ API 키 없음', 'err'); return; }
  if (!opts.chains.length) { log('⚠ 체인 선택 없음', 'warn'); return; }

  running = true; aborted = false; edges = []; apiCalls = 0;
  limiter.rpm = opts.rpm;
  $('btn-start').disabled = true; $('btn-stop').disabled = false;
  $('res-body').innerHTML = ''; $('no-res').style.display = '';
  $('res-count').textContent = '0';
  updateStats(); renderTable();

  log(`=== 분석 시작 ===`, 'info');
  log(`시드 ${seeds.length}개 · 체인 ${opts.chains.join(',')} · 기간 ${opts.timeLast||'전체'} · RPM ${opts.rpm}`, 'info');

  const selectedSeeds = seeds; // 선택된 시드

  // STEP 1: 각 시드의 아웃바운드 TX → CEX 입금주소 수집
  setStep(1);
  // deposit → {exchange, chain, depObj}
  const depositMap = new Map();

  for (const seed of selectedSeeds) {
    if (aborted) break;
    log(`[STEP 1] ${short(seed)} 아웃바운드 조회`, 'dim');
    const txs = await fetchAll(seed, 'out', { to: 'type:cex', usdGte: opts.usdGte }, opts,
      (pg, cnt, tot) => log(`  └ p${pg}: ${cnt}건 (누적 ${tot})`, 'dim'));
    log(`[STEP 1] → ${txs.length}건`, 'ok');

    // STEP 2: to_address에서 거래소 입금주소 추출
    setStep(2);
    for (const tx of txs) {
      const toObj = tx.toAddress || tx.to;
      if (!toObj) continue;
      const dep = (toObj.address || '').toLowerCase();
      if (!dep || depositMap.has(dep)) continue;
      if (classify(toObj) !== 'exchange') continue;
      const exch = entName(toObj) || 'Unknown Exchange';
      const chain = tx.chain || opts.chains[0];
      depositMap.set(dep, { exchange: exch, chain, depObj: toObj });
      log(`[STEP 2] 입금주소: ${short(dep)} = ${exch} (${chain})`, 'ok');
    }
  }

  log(`[STEP 2] 총 입금주소 ${depositMap.size}개`, 'info');
  updateStats();

  // STEP 3: 각 입금주소의 인바운드 TX → 발신자 수집
  setStep(3);
  // 이미 처리한 입금주소 (캐시)
  const depCache = new Map(); // dep → [{fromObj, usd}]

  for (const [dep, { exchange, chain }] of depositMap) {
    if (aborted) break;
    log(`[STEP 3] ${short(dep)} (${exchange}) 인바운드 조회`, 'info');
    const txs = await fetchAll(dep, 'in',
      { from: '!type:exchange', usdGte: opts.usdGte }, opts,
      (pg, cnt, tot) => log(`  └ p${pg}: ${cnt}건 (누적 ${tot})`, 'dim'));
    log(`[STEP 3] → ${txs.length}건`, 'ok');

    // STEP 4: 발신자 필터링
    setStep(4);
    const senderMap = new Map(); // from → {fromObj, usd}
    for (const tx of txs) {
      const fromObj = tx.fromAddress || tx.from;
      if (!fromObj) continue;
      const from = (fromObj.address || '').toLowerCase();
      if (!from || from === dep) continue;

      const cls = classify(fromObj);
      if (cls === 'contract') continue;
      if (cls === 'exchange') continue;
      if (cls === 'entity' && !seeds.includes(from)) continue; // known entity (whale 등) — 시드 예외

      const label = (fromObj.arkhamLabel?.name || '').toLowerCase();
      if (label.includes('hot wallet') || label.includes('cold wallet')) continue;

      if (!senderMap.has(from)) {
        senderMap.set(from, { fromObj, usd: tx.historicalUSD || tx.usdValue || 0 });
      }
    }

    // 발신자 수 제한 — 공용 입금주소 스킵
    if (senderMap.size > opts.maxSenders) {
      log(`[STEP 4] ⚠ 발신자 ${senderMap.size}명 > ${opts.maxSenders}명 — 공용 주소 스킵`, 'warn');
      continue;
    }

    depCache.set(dep, senderMap);

    // 그래프 엣지 추가
    for (const [from, { usd }] of senderMap) {
      edges.push({ wallet: from, deposit: dep, exchange, chain, usd });
      log(`[STEP 4] ← ${short(from)} (${fmtUsd(usd)})`, 'dim');
    }
    updateStats();
    renderTable();
  }

  // STEP 5: Union-Find로 클러스터 계산
  setStep(5);
  const clusters = computeClusters();
  log(`[STEP 5] 클러스터 ${clusters.size}개 계산 완료`, 'ok');
  updateStats();
  renderTable();

  STEPS.forEach(s => {
    if ($('sn' + s.id)) {
      $('sn' + s.id).className = 'snum done';
      $('sl' + s.id).className = 'slbl done';
    }
  });
  log(`=== 완료 · API ${apiCalls}회 · 엣지 ${edges.length}개 · 클러스터 ${clusters.size}개 ===`, 'ok');
  running = false; $('btn-start').disabled = false; $('btn-stop').disabled = true;
}

function stop() {
  aborted = true; running = false;
  log('⬛ 중지', 'warn');
  $('btn-start').disabled = false; $('btn-stop').disabled = true;
}

// ── Union-Find 클러스터링 ─────────────────────────────────────────────
function computeClusters() {
  // 노드: wallet 주소들
  const parent = new Map();
  const find = x => {
    if (!parent.has(x)) parent.set(x, x);
    if (parent.get(x) !== x) parent.set(x, find(parent.get(x)));
    return parent.get(x);
  };
  const union = (a, b) => {
    const pa = find(a), pb = find(b);
    if (pa !== pb) parent.set(pa, pb);
  };

  // 같은 입금주소를 공유하는 지갑들을 연결
  const depToWallets = new Map();
  for (const e of edges) {
    if (!depToWallets.has(e.deposit)) depToWallets.set(e.deposit, []);
    depToWallets.get(e.deposit).push(e.wallet);
  }
  for (const wallets of depToWallets.values()) {
    for (let i = 1; i < wallets.length; i++) union(wallets[0], wallets[i]);
  }

  // 클러스터 ID 할당
  const clusters = new Map(); // root → clusterId
  let ctr = 0;
  for (const e of edges) {
    const root = find(e.wallet);
    if (!clusters.has(root)) clusters.set(root, 'C' + String(++ctr).padStart(3, '0'));
  }
  return clusters;
}

function getClusterId(wallet) {
  const parent = new Map();
  const find = x => {
    if (!parent.has(x)) parent.set(x, x);
    if (parent.get(x) !== x) parent.set(x, find(parent.get(x)));
    return parent.get(x);
  };
  const union = (a, b) => { const pa = find(a), pb = find(b); if (pa !== pb) parent.set(pa, pb); };
  const depToWallets = new Map();
  for (const e of edges) {
    if (!depToWallets.has(e.deposit)) depToWallets.set(e.deposit, []);
    depToWallets.get(e.deposit).push(e.wallet);
  }
  for (const wallets of depToWallets.values())
    for (let i = 1; i < wallets.length; i++) union(wallets[0], wallets[i]);
  const clusterMap = new Map();
  let ctr = 0;
  for (const e of edges) {
    const root = find(e.wallet);
    if (!clusterMap.has(root)) clusterMap.set(root, 'C' + String(++ctr).padStart(3, '0'));
  }
  return clusterMap.get(find(wallet)) || '—';
}

// ── 통계 업데이트 ─────────────────────────────────────────────────────
function updateStats() {
  $('s-api').textContent = apiCalls;

  $('s-wallet').textContent = wallets.size;

}

  const clusterMap = new Map();

    const parent = new Map();
    const find = x => { if (!parent.has(x)) parent.set(x, x); if (parent.get(x) !== x) parent.set(x, find(parent.get(x))); return parent.get(x); };
    const union = (a, b) => { const pa = find(a), pb = find(b); if (pa !== pb) parent.set(pa, pb); };
    const d2w = new Map();
    for (const e of edges) { if (!d2w.has(e.deposit)) d2w.set(e.deposit, []); d2w.get(e.deposit).push(e.wallet); }
    for (const ws of d2w.values()) for (let i = 1; i < ws.length; i++) union(ws[0], ws[i]);

  for (const e of edges) {
    const k = e.wallet + '::' + e.deposit;
    if (seen.has(k)) continue; seen.add(k);
    const cid = cm.get(find(e.wallet)) || '';
    rows.push([cid, e.wallet, PERSON_ADDRESSES[e.wallet]||'',
      seedSet.has(e.wallet)?'seed':'new', e.deposit,
      `"${e.exchange}"`, e.chain, e.usd||0,
      arkUrl(e.wallet), arkUrl(e.deposit)].join(','));
  }
  const blob = new Blob([hdr + '\n' + rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'wallet-clusters.csv'; a.click();
  log('CSV 내보내기 완료', 'ok');
}

// ── 리포트 내보내기 ───────────────────────────────────────────────────
function exportReport() {
  if (!edges.length) { log('결과 없음', 'warn'); return; }

  // 클러스터 계산
  const parent = new Map();
  const find = x => { if (!parent.has(x)) parent.set(x, x); if (parent.get(x) !== x) parent.set(x, find(parent.get(x))); return parent.get(x); };
  const union = (a, b) => { const pa = find(a), pb = find(b); if (pa !== pb) parent.set(pa, pb); };
  const d2w = new Map();
  for (const e of edges) { if (!d2w.has(e.deposit)) d2w.set(e.deposit, []); d2w.get(e.deposit).push(e.wallet); }
  for (const ws of d2w.values()) for (let i = 1; i < ws.length; i++) union(ws[0], ws[i]);
  const cm = new Map(); let ctr = 0;
  for (const e of edges) { const r = find(e.wallet); if (!cm.has(r)) cm.set(r, 'C' + String(++ctr).padStart(3,'0')); }
  const getCid = w => cm.get(find(w)) || '—';

  const seedSet = new Set(seeds);
  const D = '═'.repeat(63);
  const d = '─'.repeat(63);
  const L = [];

  L.push(D, '  WALLET CLUSTER ANALYZER — 자동 분석 리포트');
  L.push(`  생성: ${new Date().toLocaleString('ko-KR')}`);
  L.push(D);

  // 지갑별 집계
  const walletInfo = new Map(); // wallet → {deposits: Map<dep, {exchange,chain}>, usdTotal, clusters}
  for (const e of edges) {
    if (!walletInfo.has(e.wallet)) walletInfo.set(e.wallet, { deposits: new Map(), usdTotal: 0, clusters: new Set() });
    const info = walletInfo.get(e.wallet);
    info.deposits.set(e.deposit, { exchange: e.exchange, chain: e.chain });
    info.usdTotal += e.usd || 0;
    info.clusters.add(getCid(e.wallet));
  }

  const allWallets = [...walletInfo.entries()];
  const seedWallets = allWallets.filter(([w]) => seedSet.has(w))
    .sort((a, b) => b[1].deposits.size - a[1].deposits.size);
  const newWallets = allWallets.filter(([w]) => !seedSet.has(w))
    .sort((a, b) => b[1].deposits.size - a[1].deposits.size);

  const totalClusters = cm.size;
  L.push(`  지갑: ${allWallets.length}개  |  클러스터: ${totalClusters}개  |  API: ${apiCalls}회`);
  L.push(D, '');

  // 시드 지갑 섹션
  L.push(`■ 시드 지갑 — ${seedWallets.length}명  (정렬: 거래소 입금 주소 수)`, d);
  seedWallets.forEach(([w, info], i) => {
    const name = PERSON_ADDRESSES[w] || w.slice(0, 10) + '…';
    L.push(`  ${i+1}위.  ${name}`);
    L.push(`       지갑:  ${w}`);
    L.push(`       거래소 입금 주소 (${info.deposits.size}개):`);
    for (const [dep, {exchange, chain}] of info.deposits)
      L.push(`         ${dep}  [${exchange} · ${chain}]`);
    const usd = info.usdTotal > 0 ? '$' + Math.round(info.usdTotal).toLocaleString() : '—';
    L.push(`       클러스터: ${[...info.clusters].join(', ')}  |  USD: ${usd}`, '');
  });

  // 신규 발견 지갑 — 시드별 그룹핑
  L.push(d, `■ 신규 발견 지갑 (시드 외) — ${newWallets.length}개`, d);

  // 각 신규 지갑이 어느 시드와 같은 입금주소 공유하는지
  const walletToSeeds = new Map();
  for (const [nw, info] of newWallets) {
    const connSeeds = new Set();
    for (const [dep] of info.deposits)
      for (const [sw] of seedWallets)
        if (walletInfo.get(sw)?.deposits.has(dep))
          connSeeds.add(PERSON_ADDRESSES[sw] || sw.slice(0,8)+'…');
    walletToSeeds.set(nw, connSeeds);
  }

  // 시드 이름별 그룹
  const seedGroupMap = new Map(); // seedName → [[wallet, info]]
  const multiSeed = [], noSeed = [];
  for (const [nw, info] of newWallets) {
    const seeds_ = walletToSeeds.get(nw);
    if (seeds_.size === 0) { noSeed.push([nw, info]); }
    else if (seeds_.size === 1) {
      const sn = [...seeds_][0];
      if (!seedGroupMap.has(sn)) seedGroupMap.set(sn, []);
      seedGroupMap.get(sn).push([nw, info]);
    } else { multiSeed.push([nw, info, seeds_]); }
  }

  // 시드별 출력
  for (const [seedName, wlist] of seedGroupMap) {
    L.push(`◆ ${seedName}  관련 의심 지갑 (${wlist.length}개)`, '─'.repeat(50));
    wlist.forEach(([nw, info], i) => {
      L.push(`  ${String(i+1).padStart(3)}위.  ${nw}`);
      L.push(`         거래소 입금 주소 (${info.deposits.size}개):`);
      for (const [dep, {exchange, chain}] of info.deposits)
        L.push(`           ${dep}  [${exchange} · ${chain}]`);
      const usd = info.usdTotal > 0 ? '$' + Math.round(info.usdTotal).toLocaleString() : '—';
      L.push(`         클러스터: ${[...info.clusters].join(', ')}  |  USD: ${usd}`, '');
    });
  }

  // 복수 시드 연결
  if (multiSeed.length) {
    L.push('◆ 복수 시드 공통 연결 지갑', '─'.repeat(50));
    multiSeed.forEach(([nw, info, seeds_], i) => {
      L.push(`  ${String(i+1).padStart(3)}위.  ${nw}`);
      L.push(`         연결 시드: ${[...seeds_].join(', ')}`);
      L.push(`         거래소 입금 주소 (${info.deposits.size}개):`);
      for (const [dep, {exchange, chain}] of info.deposits)
        L.push(`           ${dep}  [${exchange} · ${chain}]`);
      const usd = info.usdTotal > 0 ? '$' + Math.round(info.usdTotal).toLocaleString() : '—';
      L.push(`         클러스터: ${[...info.clusters].join(', ')}  |  USD: ${usd}`, '');
    });
  }

  // 시드 연결 없는 지갑
  if (noSeed.length) {
    L.push(`◆ 시드와 직접 연결 없음 (${noSeed.length}개)`, '─'.repeat(50));
    noSeed.forEach(([nw, info], i) => {
      L.push(`  ${String(i+1).padStart(3)}위.  ${nw}`);
      L.push(`         거래소 입금 주소 (${info.deposits.size}개):`);
      for (const [dep, {exchange, chain}] of info.deposits)
        L.push(`           ${dep}  [${exchange} · ${chain}]`);
      const usd = info.usdTotal > 0 ? '$' + Math.round(info.usdTotal).toLocaleString() : '—';
      L.push(`         클러스터: ${[...info.clusters].join(', ')}  |  USD: ${usd}`, '');
    });
  }

  // 클러스터별 구성
  L.push('', D, '■ 클러스터별 구성', d);
  const clusterWallets = new Map();
  for (const [w] of allWallets) {
    const cid = getCid(w);
    if (!clusterWallets.has(cid)) clusterWallets.set(cid, { wallets: [], deposits: new Map() });
    clusterWallets.get(cid).wallets.push(w);
    for (const [dep, dinfo] of walletInfo.get(w).deposits)
      clusterWallets.get(cid).deposits.set(dep, dinfo);
  }
  const sorted = [...clusterWallets.entries()].sort((a,b) => b[1].wallets.length - a[1].wallets.length);
  for (const [cid, { wallets: ws, deposits: deps }] of sorted) {
    const depList = [...deps.entries()];
    const exchLabel = depList.map(([,d]) => `${d.exchange} · ${d.chain}`).join(' / ');
    L.push(`  ${cid}  (지갑 ${ws.length}개)  |  ${exchLabel}`);
    for (const [dep] of depList) L.push(`         입금주소: ${dep}`);
    for (const w of ws) {
      const name = PERSON_ADDRESSES[w] ? `  [${PERSON_ADDRESSES[w]}]` : '';
      const tag = seedSet.has(w) ? ' [seed]' : '';
      L.push(`    └ ${w}${name}${tag}`);
    }
    L.push('');
  }

  L.push(D, '  END OF REPORT', D);

  const txt = L.join('\n');
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `wallet-report-${new Date().toISOString().slice(0,10)}.txt`; a.click();
  log('리포트 내보내기 완료', 'ok');
}

// ── 시드 UI ───────────────────────────────────────────────────────────
function toggleSeed() {
  const p = $('seed-panel'), t = $('seed-toggle');
  if (p.style.display === 'none') { p.style.display = ''; t.textContent = '▲ collapse'; }
  else { p.style.display = 'none'; t.textContent = '▼ expand'; }
}
function renderSeeds() {
  $('seed-list').innerHTML = seeds.map(a => {
    const name = PERSON_ADDRESSES[a] || '';
    return `<div>${name ? `<span style="color:var(--amber)">${name}</span>  ` : ''}${a}</div>`;
  }).join('');
  $('seed-count').textContent = seeds.length;
}
function addSeed() {
  const el = $('add-addr'), v = el.value.trim().toLowerCase();
  if (!v.startsWith('0x') || v.length !== 42) { log('유효한 0x 주소 아님', 'warn'); return; }
  if (!seeds.includes(v)) { seeds.push(v); renderSeeds(); log('추가: ' + v, 'ok'); }
  el.value = '';
}
function resetSeeds() { seeds = SEEDS_RAW.map(a => a.toLowerCase()); renderSeeds(); log('시드 초기화', 'warn'); }

// ── 체인 UI ───────────────────────────────────────────────────────────
function renderChains() {
  $('chain-grid').innerHTML = Object.entries(CHAINS).map(([key, c]) => `
    <div class="ci ${c.on?'on':''}" onclick="toggleChain('${key}')">
      <div class="cdot" id="dot-${key}"></div>
      <div>
        <div class="cname" style="color:${c.on?c.color:'#4a6a8a'}">${c.name}</div>
        <div class="csub">${c.id}</div>
      </div>
    </div>`).join('');
}
function toggleChain(key) { CHAINS[key].on = !CHAINS[key].on; renderChains(); }

// ── 파이프라인 UI ─────────────────────────────────────────────────────
function renderSteps() {
  $('step-list').innerHTML = STEPS.map(s => `
    <div class="srow">
      <div class="snum" id="sn${s.id}">${s.id}</div>
      <div class="slbl" id="sl${s.id}">${s.label}</div>
    </div>`).join('');
}

// ── localStorage 복원 ─────────────────────────────────────────────────
(function init() {
  const saved = {
    key:   localStorage.getItem('ark_key')   || '',
    proxy: localStorage.getItem('ark_proxy') || 'https://walo.onrender.com',
  };
  if (saved.key)   $('api-key').value   = saved.key;
  if (saved.proxy) $('proxy-url').value = saved.proxy;
  $('api-key').addEventListener('input',   () => localStorage.setItem('ark_key',   $('api-key').value));
  $('proxy-url').addEventListener('input', () => localStorage.setItem('ark_proxy', $('proxy-url').value));

  renderChains(); renderSteps(); renderSeeds(); updateStats();
  log('준비 완료. API 키 입력 → 체인 선택 → 분석 시작', 'ok');
  log(`시드 ${seeds.length}개 로드됨`, 'info');
  log('v9.0 · 재설계: 이분그래프 + Union-Find 클러스터 + 단일 classify() 함수', 'info');
})();
</script>
