<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurfTracer v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#0a0b0d;--surface:#111318;--surface2:#171b22;--surface3:#1e2330;--border:#23293a;--border2:#2e3650;--text:#e8eaf0;--text-muted:#8b92a8;--text-dim:#4a5068;--accent:#00e5a0;--accent-dim:#00b87a;--blue:#4d9fff;--yellow:#f5c842;--red:#ff5c5c;--mono:'JetBrains Mono','Fira Code',monospace;--radius:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:15px;font-weight:700;letter-spacing:1px;color:var(--accent);font-family:var(--mono)}
.sidebar-header p{font-size:10px;color:var(--text-dim);margin-top:3px}
.section{padding:14px 14px 0}
.section-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-family:var(--mono);margin-bottom:8px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--text-muted);margin-bottom:4px}
input[type=text],input[type=password],input[type=number],select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:11px;padding:6px 8px;outline:none;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--border2)}
input[type=range]{width:100%;accent-color:var(--accent)}
.wallet-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px}
.wallet-entry-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.wallet-idx{font-family:var(--mono);font-size:9px;color:var(--accent-dim);font-weight:700;min-width:16px}
.btn-remove{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;transition:color .15s}
.btn-remove:hover{color:var(--red)}
.file-drop{border:1px dashed var(--border2);border-radius:var(--radius);padding:8px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.file-drop:hover{border-color:var(--accent-dim);background:rgba(0,229,160,.04)}
.file-drop-inner{pointer-events:none}
.file-status{font-size:10px;font-family:var(--mono);color:var(--accent-dim);margin-top:3px;min-height:14px}
.btn-add{width:100%;background:none;border:1px dashed var(--border2);border-radius:var(--radius);color:var(--text-dim);padding:7px;cursor:pointer;font-size:11px;transition:all .15s}
.btn-add:hover{border-color:var(--accent-dim);color:var(--accent)}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input{flex:1}
.slider-val{font-family:var(--mono);font-size:12px;color:var(--accent);min-width:20px}
.btn-start{margin:14px;background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:11px;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:.5px;transition:opacity .15s}
.btn-start:hover{opacity:.85}
.btn-start:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{margin:0 14px 14px;background:none;border:1px solid var(--red);color:var(--red);font-size:12px;padding:8px;border-radius:var(--radius);cursor:pointer;display:none}
.credit-bar-wrap{padding:0 14px 14px}
.credit-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);font-family:var(--mono);margin-bottom:4px}
.credit-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.credit-bar-inner{height:100%;background:var(--accent);border-radius:2px;transition:width .3s,background .3s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:12px 18px;font-size:12px;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text-muted)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-badge{display:inline-block;background:var(--surface3);border-radius:10px;font-size:9px;font-family:var(--mono);padding:1px 6px;margin-left:5px;color:var(--accent-dim)}
.tab-content{display:none;flex:1;overflow:auto}
.tab-content.active{display:flex;flex-direction:column}
#terminal{flex:1;padding:14px 16px;font-family:var(--mono);font-size:11.5px;line-height:1.7;overflow-y:auto}
.log-line{display:block}
.log-line.header{color:var(--text-dim)}
.log-line.deposit{color:var(--accent)}
.log-line.personal{color:var(--blue)}
.log-line.warn{color:var(--yellow)}
.log-line.error{color:var(--red)}
.log-line.done{color:var(--accent);font-weight:600}
.log-empty{padding:40px;text-align:center;color:var(--text-dim);font-size:12px}
.result-wrap{padding:12px 16px;flex:1;overflow:auto}
.result-toolbar{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.btn-sm{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-muted);font-size:10px;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent-dim);color:var(--text)}
.result-table{width:100%;border-collapse:collapse;font-size:11px}
.result-table th{background:var(--surface2);padding:7px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);position:sticky;top:0}
.result-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.result-table tr:hover td{background:var(--surface2)}
.addr{font-family:var(--mono);font-size:10px;color:var(--text-muted);cursor:pointer}
.addr:hover{color:var(--accent)}
.badge{display:inline-block;border-radius:3px;font-size:9px;font-family:var(--mono);padding:1px 5px}
.badge-deposit{background:rgba(0,229,160,.12);color:var(--accent)}
.badge-personal{background:rgba(77,159,255,.12);color:var(--blue)}
.badge-chain{background:var(--surface3);color:var(--text-muted)}
.depth-num{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-align:center}
.empty-state{padding:50px;text-align:center;color:var(--text-dim)}
.empty-state .icon{font-size:32px;margin-bottom:10px}
.dl-wrap{padding:20px;display:flex;flex-direction:column;gap:10px}
.dl-section-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-top:8px}
#proxy-error{display:none;background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.3);border-radius:var(--radius);padding:10px 12px;margin:10px 14px 0}
#proxy-error p{font-size:11px;color:var(--red)}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <h1>SurfTracer</h1>
    <p>v3.0 · Arkham CSV + Surf API</p>
  </div>
  <div class="section" style="margin-top:10px">
    <div class="section-label">연결 설정</div>
    <div class="field">
      <label>Surf API Key</label>
      <input type="password" id="apiKey" placeholder="sk-…" autocomplete="off" oninput="localStorage.setItem('sft_key',this.value)">
    </div>
    <div class="field">
      <label style="display:flex;justify-content:space-between"><span>Proxy URL</span><span style="color:var(--text-dim);font-size:9px">비워두면 직접 연결</span></label>
      <input type="text" id="proxyUrl" placeholder="http://localhost:8080/surf" oninput="localStorage.setItem('sft_proxy',this.value)" style="font-family:var(--mono);font-size:10px">
    </div>
  </div>
  <div id="proxy-error"><p id="proxy-error-msg"></p></div>
  <div class="section" style="margin-top:4px">
    <div class="section-label">분석 대상 지갑</div>
    <div id="walletList"></div>
    <button class="btn-add" onclick="addWalletEntry()">+ 지갑 추가</button>
  </div>
  <div class="section" style="margin-top:12px">
    <div class="section-label">분석 파라미터</div>
    <div class="field">
      <label>Depth (개인지갑 역추적 깊이)</label>
      <div class="slider-row">
        <input type="range" id="depth" min="1" max="5" value="2" oninput="document.getElementById('depthVal').textContent=this.value">
        <span class="slider-val" id="depthVal">2</span>
      </div>
    </div>
    <div class="field">
      <label>최대 Credit 사용량</label>
      <input type="number" id="maxCredit" value="100" min="10" max="9999">
    </div>
    <div class="field">
      <label>연도 필터</label>
      <select id="yearFilter">
        <option value="all">전체 기간</option>
        <option value="365">최근 1년</option>
        <option value="730">최근 2년</option>
        <option value="1095">최근 3년</option>
      </select>
    </div>
    <div class="field">
      <label>Surf 조회 체인 (역추적용)</label>
      <div id="chainGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px"><input type="checkbox" value="base" checked> base</label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px"><input type="checkbox" value="bsc" checked> bsc</label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px"><input type="checkbox" value="arbitrum" checked> arbitrum</label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px"><input type="checkbox" value="ethereum" checked> ethereum</label>
      </div>
    </div>
  </div>
  <button class="btn-start" id="startBtn" onclick="startAnalysis()">▶ 분석 시작</button>
  <button class="btn-stop" id="stopBtn" onclick="stopAnalysis()">⏹ 중단</button>
  <div class="credit-bar-wrap">
    <div class="credit-label"><span>CREDIT</span><span id="creditText">0 / 100</span></div>
    <div class="credit-bar"><div class="credit-bar-inner" id="creditBar" style="width:0%"></div></div>
  </div>
</aside>
<main id="main">
  <div class="tabs">
    <div class="tab active" data-tab="terminal">터미널</div>
    <div class="tab" data-tab="deposits">거래소 입금 주소 <span class="tab-badge" id="depCount">0</span></div>
    <div class="tab" data-tab="personal">개인 지갑 <span class="tab-badge" id="perCount">0</span></div>
    <div class="tab" data-tab="download">다운로드</div>
  </div>
  <div class="tab-content active" id="tab-terminal">
    <div id="terminal"><div class="log-empty">분석 시작 전입니다.<br>지갑 주소와 Arkham CSV ZIP 파일을 등록하세요.</div></div>
  </div>
  <div class="tab-content" id="tab-deposits">
    <div class="result-wrap">
      <div class="result-toolbar">
        <button class="btn-sm" onclick="downloadCSV('deposits')">CSV 저장</button>
        <button class="btn-sm" onclick="downloadJSON('deposits')">JSON 저장</button>
        <span style="font-size:10px;color:var(--text-dim);font-family:var(--mono);margin-left:4px">📂 Arkham CSV 기반 · 🌐 Surf 보완</span>
      </div>
      <table class="result-table">
        <thead><tr><th>#</th><th>주소</th><th>거래소</th><th>체인</th><th>TX건수</th><th>출처</th><th>Arkham</th></tr></thead>
        <tbody id="depositsBody"><tr><td colspan="7" class="empty-state"><div class="icon">🏦</div>거래소 입금 주소가 없습니다</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="tab-content" id="tab-personal">
    <div class="result-wrap">
      <div class="result-toolbar">
        <button class="btn-sm" onclick="downloadCSV('personal')">CSV 저장</button>
        <button class="btn-sm" onclick="downloadJSON('personal')">JSON 저장</button>
      </div>
      <table class="result-table">
        <thead><tr><th>#</th><th>주소</th><th>라벨</th><th>체인</th><th>Depth</th><th>TX건수</th><th>Arkham</th></tr></thead>
        <tbody id="personalBody"><tr><td colspan="7" class="empty-state"><div class="icon">👤</div>개인 지갑이 없습니다</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="tab-content" id="tab-download">
    <div class="dl-wrap">
      <div class="dl-section-label">결과 저장</div>
      <button class="btn-sm" style="width:260px" onclick="downloadAll()">📦 전체 결과 JSON</button>
      <button class="btn-sm" style="width:260px" onclick="downloadCSV('all')">📋 전체 CSV (통합)</button>
      <div class="dl-section-label">진단 로그</div>
      <button class="btn-sm" style="width:260px" onclick="downloadDiagLog()">📄 터미널 로그 TXT</button>
      <button class="btn-sm" style="width:260px" onclick="downloadFullDiag()">🗂️ 전체 진단 JSON</button>
    </div>
  </div>
</main>

<script>
// ── 상수 ──
const CHAIN_MAP={'base':'base','bsc':'bsc','ethereum':'ethereum','arbitrum_one':'arbitrum','arbitrum':'arbitrum','optimism':null,'polygon':null,'avalanche':null,'avalanche_c':null};
const EXCLUDE_RE=/rhinofi|relay\.link|megaeth|paxos|yeet\.com|depositor|pre.?deposit|dvf|disperse|peg|concrete|wormhole|stargate|layerzero|axelar|router|aggregator|uniswap|pancake|sushi|1inch|paraswap|dex router|amm|proxy/i;
const NOT_PERSONAL=new Set(['exchange','cex','cex_deposit','contract','proxy','fund','dex','bridge','router','misc','stablecoin']);
const CEX_RE=/\b(binance|coinbase|kraken|okx|bybit|gate\.io|gate |kucoin|bitget|htx|mexc|upbit|bithumb|huobi|gemini|bitfinex|bitstamp|korbit|gopax|reku|cryptomus|btc markets|coins\.ph|phemex|wazirx)\b/i;

function isDepositLabel(label){
  if(!label)return false;
  if(!/ Deposit/i.test(label))return false;
  if(EXCLUDE_RE.test(label))return false;
  return true;
}

function isPersonalWallet(item){
  if(!item)return true;
  const et=item.entity_type||'';
  const en=item.entity_name||'';
  if(NOT_PERSONAL.has(et))return false;
  if(et==='cex'||CEX_RE.test(en))return false;
  return true;
}

// ── 지갑 엔트리 ──
let walletEntries=[];

function addWalletEntry(){
  const id=Date.now();
  walletEntries.push({id,address:'',file:null,csvRows:[]});
  renderWalletList();
}

function removeWallet(id){
  walletEntries=walletEntries.filter(e=>e.id!==id);
  renderWalletList();
}

function renderWalletList(){
  const list=document.getElementById('walletList');
  list.innerHTML='';
  walletEntries.forEach((entry,i)=>{
    const idx=walletEntries.indexOf(entry);
    const div=document.createElement('div');
    div.className='wallet-entry';
    div.innerHTML=`
      <div class="wallet-entry-top">
        <span class="wallet-idx">#${i+1}</span>
        <input type="text" placeholder="0x…" value="${entry.address}"
          oninput="walletEntries[${idx}].address=this.value"
          style="flex:1;font-family:var(--mono);font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:5px 7px;outline:none">
        <button class="btn-remove" onclick="removeWallet(${entry.id})">✕</button>
      </div>
      <div class="file-drop" id="drop-${entry.id}">
        <input type="file" accept=".zip,.csv" style="position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1"
          onchange="handleFileChange(event,${entry.id})">
        <div class="file-drop-inner">
          <div style="font-size:10px;color:var(--text-dim)">📂 Arkham CSV ZIP 업로드</div>
          <div class="file-status" id="status-${entry.id}">${entry.file?'✅ '+entry.file.name:''}</div>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

async function handleFileChange(event,id){
  const file=event.target.files[0];
  if(!file)return;
  const entry=walletEntries.find(e=>e.id===id);
  if(!entry)return;
  entry.file=file;
  const statusEl=document.getElementById('status-'+id);
  statusEl.textContent='⏳ 파싱 중…';
  try{
    entry.csvRows=await parseZipOrCSV(file);
    statusEl.textContent=`✅ ${file.name} (${entry.csvRows.length}행)`;
  }catch(e){
    statusEl.textContent=`❌ ${e.message}`;
  }
}

async function parseZipOrCSV(file){
  if(file.name.toLowerCase().endsWith('.zip')){
    const zip=await JSZip.loadAsync(file);
    let allRows=[];
    let hasHeader=false;
    const files=Object.values(zip.files).filter(f=>!f.dir&&f.name.toLowerCase().endsWith('.csv'));
    files.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
    for(const zf of files){
      const text=await zf.async('text');
      const rows=parseCSVText(text);
      if(!rows.length)continue;
      if(!hasHeader){allRows=rows;hasHeader=true;}
      else allRows.push(...rows.slice(1));
    }
    return allRows.slice(1); // 헤더 제거
  }else{
    const text=await file.text();
    return parseCSVText(text).slice(1);
  }
}

function parseCSVText(text){
  const lines=text.replace(/\r\n/g,'\n').split('\n');
  const result=[];
  let header=null;
  for(const raw of lines){
    const line=raw.trim();
    if(!line)continue;
    const cols=parseCSVLine(line);
    if(!header){header=cols;result.push(header);continue;}
    const obj={};
    header.forEach((h,i)=>obj[h]=cols[i]||'');
    result.push(obj);
  }
  return result;
}

function parseCSVLine(line){
  const result=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}

// ── Arkham CSV → 거래소 입금 주소 ──
function extractDepositsFromCSV(rows,seedAddr){
  const seed=seedAddr.toLowerCase();
  const depMap=new Map();
  for(const r of rows){
    const from=(r.fromAddress||'').toLowerCase();
    const to=(r.toAddress||'').toLowerCase();
    if(from!==seed)continue;
    const lbl=r.toLabel||'';
    const chain=r.chain||'';
    if(!isDepositLabel(lbl))continue;
    if(!to||to==='0x0000000000000000000000000000000000000000')continue;
    const entityName=lbl.replace(/\s*\([^)]+\)\s*$/,'').trim();
    if(!depMap.has(to))depMap.set(to,{address:to,entity_name:entityName,chains:new Set(),tx_cnt:0,source:'arkham_csv'});
    const d=depMap.get(to);
    d.tx_cnt++;
    const sc=CHAIN_MAP[chain];
    if(sc)d.chains.add(sc);
    else d.chains.add(chain); // 미지원 체인 표시용
  }
  return depMap;
}

// ── Surf 클라이언트 ──
class SurfClient{
  constructor(apiKey,proxyUrl,maxCredit){
    this.base=proxyUrl?proxyUrl.replace(/\/+$/,'')+'/gateway/v1':'https://api.asksurf.ai/gateway/v1';
    this.headers={'Content-Type':'application/json','x-api-key':apiKey};
    this.maxCredit=maxCredit;this.creditUsed=0;this.creditLog=[];this.errorLog=[];this._cache={};
  }
  _check(){if(this.creditUsed>=this.maxCredit)throw new Error(`Credit 한도 도달: ${this.creditUsed} / ${this.maxCredit}`);}
  async _req(method,path,opts={},retry=0){
    const url=this.base+path;
    try{
      const resp=await fetch(url,{method,headers:this.headers,mode:'cors',...opts});
      const body=await resp.json().catch(()=>({}));
      if(!resp.ok){
        if([502,503,429].includes(resp.status)&&retry<2){await new Promise(r=>setTimeout(r,(1+retry)*1500));return this._req(method,path,opts,retry+1);}
        throw new Error(`HTTP ${resp.status}`);
      }
      const used=body?.meta?.credits_used||0;
      if(used){
        this.creditUsed+=used;
        this.creditLog.push({time:new Date().toLocaleTimeString('ko-KR'),endpoint:path.split('?')[0],credits:used,total:this.creditUsed});
        updateCredit(this.creditUsed,this.maxCredit);
        if(this.creditUsed>=this.maxCredit)throw new Error(`Credit 한도 도달: ${this.creditUsed} / ${this.maxCredit}`);
      }
      return body?.data??body??[];
    }catch(e){
      if(e.message?.includes('Credit 한도'))throw e;
      if(e.name==='TypeError'){
        document.getElementById('proxy-error').style.display='block';
        document.getElementById('proxy-error-msg').textContent=this.base.includes('api.asksurf.ai')?'CORS/네트워크 오류. Proxy URL을 입력해보세요.':`proxy.py가 ${this.base.split('/gateway')[0]} 에서 실행 중인지 확인하세요.`;
        throw new Error(e.message);
      }
      throw e;
    }
  }
  async getTransfers(address,chain,flow,limit=100){
    const key=`tf:${chain}:${address}:${flow}`;
    if(this._cache[key])return this._cache[key];
    this._check();
    const p=new URLSearchParams({address,chain,flow,limit,include:'labels'});
    const data=await this._req('GET',`/wallet/transfers?${p}`);
    const txs=Array.isArray(data)?data:(data?.transfers||data?.data||[]);
    this._cache[key]=txs;return txs;
  }
  async labelsBatch(addresses,chain){
    const unique=[...new Set(addresses.filter(a=>a?.startsWith('0x')))];
    if(!unique.length)return[];
    const out=[];
    for(let i=0;i<unique.length;i+=20){
      const batch=unique.slice(i,i+20).sort();
      const key=`lb:${chain}:${batch.join(',')}`;
      if(this._cache[key]){out.push(...this._cache[key]);continue;}
      this._check();
      const p=new URLSearchParams({addresses:batch.join(',')});
      const data=await this._req('GET',`/wallet/labels/batch?${p}`);
      this._cache[key]=data;out.push(...data);
    }
    return out;
  }
}

// ── 날짜 필터 ──
function getCutoff(yearFilter){
  if(yearFilter==='all'||!yearFilter)return null;
  const days=parseInt(yearFilter);if(!days)return null;
  const d=new Date();d.setDate(d.getDate()-days);return d;
}
function filterDate(txs,cutoff){
  if(!cutoff)return txs;
  return txs.filter(t=>{
    const raw=t.timestamp||t.block_timestamp||t.blockTimestamp;
    if(!raw)return true;
    try{return new Date(String(raw).slice(0,10))>=cutoff;}catch{return true;}
  });
}

// ── 상태 ──
let _running=false,_client=null,_deposits={},_personal={};

// ── 분석 시작 ──
async function startAnalysis(){
  const apiKey=document.getElementById('apiKey').value.trim();
  if(!apiKey){alert('Surf API Key를 입력하세요.');return;}
  const valid=walletEntries.filter(e=>e.address.trim()&&e.csvRows.length>0);
  if(!valid.length){alert('지갑 주소와 Arkham CSV ZIP 파일을 하나 이상 등록하세요.');return;}
  const maxCredit=parseInt(document.getElementById('maxCredit').value)||100;
  const maxDepth=parseInt(document.getElementById('depth').value)||2;
  const yearFilter=document.getElementById('yearFilter').value;
  const proxyUrl=document.getElementById('proxyUrl').value.trim();
  const chains=[...document.querySelectorAll('#chainGrid input:checked')].map(c=>c.value);
  _running=true;_deposits={};_personal={};
  _client=new SurfClient(apiKey,proxyUrl,maxCredit);
  document.getElementById('proxy-error').style.display='none';
  document.getElementById('startBtn').disabled=true;
  document.getElementById('stopBtn').style.display='block';
  clearTerm();clearTables();
  log(`SurfTracer v3.0  |  ${new Date().toLocaleString('ko-KR')}`,'header');
  log(`지갑 ${valid.length}개  |  Depth: ${maxDepth}  |  Credit 한도: ${maxCredit}`,'header');
  log(`Surf 역추적 체인: ${chains.join(', ')}`,'header');
  log('');
  try{
    // ── Phase 1: Arkham CSV ──
    log('─'.repeat(44),'header');
    log('Phase 1: Arkham CSV → 거래소 입금 주소 추출','header');
    log('─'.repeat(44),'header');
    const cutoff=getCutoff(yearFilter);
    const seedSet=new Set();
    for(const entry of valid){
      if(!_running)break;
      const seed=entry.address.trim().toLowerCase();
      log(`\n📂 [${entry.address.slice(0,16)}…] CSV ${entry.csvRows.length}행 분석 중…`);
      const depMap=extractDepositsFromCSV(entry.csvRows,seed);
      log(`  → 거래소 입금 주소 ${depMap.size}개 발견 (Arkham 기준)`,'deposit');
      for(const[addr,info]of depMap){
        if(!_deposits[addr]){
          _deposits[addr]={...info,chains:[...info.chains],seed:entry.address,depth:0};
        }else{
          const merged=new Set([..._deposits[addr].chains,...info.chains]);
          _deposits[addr].chains=[...merged];
          _deposits[addr].tx_cnt+=info.tx_cnt;
        }
        log(`  ✅ ${info.entity_name}  ${addr.slice(0,16)}… [[...info.chains].join(',')]  (${info.tx_cnt}건)`,'deposit');
      }
      updateTable('deposits');
      seedSet.add(seed);
    }
    log(`\n📊 Phase 1 완료: 거래소 입금 주소 ${Object.keys(_deposits).length}개`,'done');

    // ── Phase 2: Surf API 역추적 ──
    log('');
    log('─'.repeat(44),'header');
    log('Phase 2: Surf API → 개인지갑 역추적','header');
    log('─'.repeat(44),'header');
    const visited=new Set([...Object.keys(_deposits),...seedSet]);
    let currentPersonal=[];

    // Depth 1: Phase 1에서 찾은 모든 입금 주소의 인바운드
    const allDepAddrs=Object.keys(_deposits);
    for(const depAddr of allDepAddrs){
      if(!_running)break;
      const depInfo=_deposits[depAddr];
      const surfChains=(depInfo.chains||[]).filter(c=>chains.includes(c));
      if(!surfChains.length)continue;
      log(`\n  [${depInfo.entity_name}] ${depAddr.slice(0,16)}… 인바운드 조회`);
      for(const chain of surfChains){
        if(!_running)break;
        try{
          const inTxs=await _client.getTransfers(depAddr,chain,'in');
          const filtered=filterDate(inTxs,cutoff);
          const sc={};
          for(const tx of filtered){
            const fr=(tx.from_address||tx.from||tx.fromAddress||'').toLowerCase();
            if(!fr||fr==='0x0000000000000000000000000000000000000000'||visited.has(fr))continue;
            sc[fr]=(sc[fr]||0)+1;
          }
          const total=Object.keys(sc).length;
          const minTx=total>5?2:1;
          const cands=Object.entries(sc).filter(([,c])=>c>=minTx).map(([a])=>a);
          if(!cands.length){log(`    [${chain}] 발신자 없음`);continue;}
          // from_label 수집
          const flMap={};
          for(const tx of filtered){
            const fr=(tx.from_address||tx.from||tx.fromAddress||'').toLowerCase();
            const lbl=tx.from_label||tx.fromLabel||{};
            if(fr&&lbl&&!flMap[fr])flMap[fr]={entity_type:lbl.entity_type||'',entity_name:lbl.entity_name||''};
          }
          // labels/batch 보완
          const needB=cands.filter(a=>!flMap[a]);
          if(needB.length){try{const lb=await _client.labelsBatch(needB,chain);for(const l of lb){const la=l.address?.toLowerCase();if(la)flMap[la]=l;}}catch(e){if(e.message?.includes('Credit 한도'))throw e;}}
          // 포이즈닝
          const ck=a=>a.slice(2,6)+'|'+a.slice(-6);
          const cm={};
          for(const a of cands)(cm[ck(a)]=cm[ck(a)]||[]).push(a);
          const poisoned=new Set();
          for(const cl of Object.values(cm))if(cl.length>=2)cl.forEach(a=>poisoned.add(a));
          if(poisoned.size)log(`    ⚠ 포이즈닝 ${poisoned.size}개 제거`,'warn');
          let added=0;
          for(const fr of cands){
            if(poisoned.has(fr)||visited.has(fr))continue;
            const item=flMap[fr]||{};
            if(!isPersonalWallet(item))continue;
            _personal[fr]={address:fr,entity_name:item.entity_name||'',entity_type:item.entity_type||'',chain,depth:1,tx_cnt:sc[fr],via_deposit:depAddr,via_exchange:depInfo.entity_name};
            visited.add(fr);currentPersonal.push(fr);added++;
            log(`    👤 [${chain}] ${fr.slice(0,16)}… (TX ${sc[fr]}건)`,'personal');
            updateTable('personal');
          }
          log(`    [${chain}] 발신자 ${cands.length}명 → 개인지갑 ${added}명`);
        }catch(e){
          if(e.message?.includes('Credit 한도'))throw e;
          _client.errorLog.push({time:new Date().toISOString(),addr:depAddr,chain,error:e.message});
          log(`    ❌ [${chain}] ${e.message}`,'error');
        }
      }
    }
    log(`\n✅ Depth 1 완료  |  개인: ${Object.keys(_personal).length}  |  Credit: ${_client.creditUsed}`,'done');

    // Depth 2+: 개인지갑의 아웃고잉에서 추가 입금 주소 탐색 → 인바운드
    for(let d=1;d<maxDepth;d++){
      if(!_running||!currentPersonal.length)break;
      log('');
      log(`${'─'.repeat(44)}`,'header');
      log(`Depth ${d+1}/${maxDepth}  —  ${currentPersonal.length}개 개인지갑 아웃고잉 탐색`,'header');
      log('─'.repeat(44),'header');
      const nextPersonal=[];
      const newDepAddrs=[];
      for(const wallet of currentPersonal){
        if(!_running)break;
        for(const chain of chains){
          if(!_running)break;
          try{
            const outTxs=await _client.getTransfers(wallet,chain,'out');
            const filtered=filterDate(outTxs,cutoff);
            for(const tx of filtered){
              const toAddr=(tx.to_address||tx.to||tx.toAddress||'').toLowerCase();
              if(!toAddr||_deposits[toAddr]||visited.has(toAddr))continue;
              const lbl=tx.to_label||tx.toLabel||{};
              const et=lbl.entity_type||'';const en=lbl.entity_name||'';
              if(et==='cex_deposit'||(et==='exchange'&&/deposit/i.test(en))){
                const ename=en||'알 수 없는 거래소';
                _deposits[toAddr]={address:toAddr,entity_name:ename,chains:[chain],tx_cnt:1,depth:d,source:'surf',seed:wallet};
                visited.add(toAddr);newDepAddrs.push({addr:toAddr,chain,entity_name:ename});
                log(`  ✅ [${chain}] ${ename} (Surf)  ${toAddr.slice(0,16)}…`,'deposit');
                updateTable('deposits');
              }
            }
          }catch(e){if(e.message?.includes('Credit 한도'))throw e;}
        }
      }
      // 새 입금 주소 인바운드 조회
      for(const{addr,chain,entity_name}of newDepAddrs){
        if(!_running)break;
        log(`\n  [${entity_name}] ${addr.slice(0,16)}… 인바운드 조회`);
        try{
          const inTxs=await _client.getTransfers(addr,chain,'in');
          const filtered=filterDate(inTxs,cutoff);
          const sc={};
          for(const tx of filtered){
            const fr=(tx.from_address||tx.from||tx.fromAddress||'').toLowerCase();
            if(!fr||fr==='0x0000000000000000000000000000000000000000'||visited.has(fr))continue;
            sc[fr]=(sc[fr]||0)+1;
          }
          const minTx=Object.keys(sc).length>5?2:1;
          const cands=Object.entries(sc).filter(([,c])=>c>=minTx).map(([a])=>a);
          if(!cands.length)continue;
          const needB=cands.filter(a=>true);
          const flMap={};
          if(needB.length){try{const lb=await _client.labelsBatch(needB,chain);for(const l of lb){const la=l.address?.toLowerCase();if(la)flMap[la]=l;}}catch(e){if(e.message?.includes('Credit 한도'))throw e;}}
          for(const fr of cands){
            if(visited.has(fr))continue;
            const item=flMap[fr]||{};
            if(!isPersonalWallet(item))continue;
            _personal[fr]={address:fr,entity_name:item.entity_name||'',entity_type:item.entity_type||'',chain,depth:d+1,tx_cnt:sc[fr],via_deposit:addr,via_exchange:entity_name};
            visited.add(fr);nextPersonal.push(fr);
            log(`    👤 [${chain}] ${fr.slice(0,16)}… (TX ${sc[fr]}건)`,'personal');
            updateTable('personal');
          }
        }catch(e){if(e.message?.includes('Credit 한도'))throw e;_client.errorLog.push({time:new Date().toISOString(),addr,chain,error:e.message});log(`    ❌ [${chain}] ${e.message}`,'error');}
      }
      log(`\n✅ Depth ${d+1} 완료  |  개인: ${Object.keys(_personal).length}  |  거래소: ${Object.keys(_deposits).length}  |  Credit: ${_client.creditUsed}`,'done');
      currentPersonal=nextPersonal;
    }
    log(`\n분석 완료  |  Credit: ${_client.creditUsed.toLocaleString()}`,'done');
  }catch(e){
    if(!e.message?.includes('Credit 한도'))log(`\n❌ 오류: ${e.message}`,'error');
  }finally{
    _running=false;
    document.getElementById('startBtn').disabled=false;
    document.getElementById('stopBtn').style.display='none';
  }
}

function stopAnalysis(){_running=false;log('\n⏹ 분석이 중단되었습니다.','warn');}

// ── UI ──
function log(text,cls=''){
  const t=document.getElementById('terminal');
  const em=t.querySelector('.log-empty');if(em)em.remove();
  text.split('\n').forEach(line=>{
    const s=document.createElement('span');
    s.className='log-line'+(cls?' '+cls:'');s.textContent=line;
    t.appendChild(s);t.appendChild(document.createElement('br'));
  });
  t.scrollTop=t.scrollHeight;
}
function clearTerm(){document.getElementById('terminal').innerHTML='';}
function clearTables(){
  document.getElementById('depositsBody').innerHTML='<tr><td colspan="7" class="empty-state"><div class="icon">🏦</div>거래소 입금 주소가 없습니다</td></tr>';
  document.getElementById('personalBody').innerHTML='<tr><td colspan="7" class="empty-state"><div class="icon">👤</div>개인 지갑이 없습니다</td></tr>';
  document.getElementById('depCount').textContent='0';
  document.getElementById('perCount').textContent='0';
}
function updateCredit(used,max){
  document.getElementById('creditText').textContent=`${used} / ${max}`;
  const pct=Math.min(used/max*100,100);
  const bar=document.getElementById('creditBar');
  bar.style.width=pct+'%';
  bar.style.background=pct>=80?'var(--red)':pct>=60?'var(--yellow)':'var(--accent)';
}
function updateTable(type){
  if(type==='deposits'){
    const items=Object.values(_deposits);
    document.getElementById('depCount').textContent=items.length;
    if(!items.length)return;
    document.getElementById('depositsBody').innerHTML=items.map((item,i)=>`
      <tr>
        <td class="depth-num">${i+1}</td>
        <td><span class="addr" title="${item.address}" onclick="copyAddr('${item.address}')">${item.address.slice(0,12)}…${item.address.slice(-6)}</span></td>
        <td><span class="badge badge-deposit">${item.entity_name||'?'}</span></td>
        <td>${(item.chains||[]).map(c=>`<span class="badge badge-chain">${c}</span>`).join(' ')}</td>
        <td class="depth-num">${item.tx_cnt||'—'}</td>
        <td style="font-size:9px;color:var(--text-dim);font-family:var(--mono)">${item.source==='arkham_csv'?'📂 Arkham':'🌐 Surf'}</td>
        <td><a href="https://intel.arkm.com/explorer/address/${item.address}" target="_blank" rel="noopener" style="color:var(--blue);font-size:10px;text-decoration:none">↗</a></td>
      </tr>
    `).join('');
  }else{
    const items=Object.values(_personal);
    document.getElementById('perCount').textContent=items.length;
    if(!items.length)return;
    document.getElementById('personalBody').innerHTML=items.map((item,i)=>`
      <tr>
        <td class="depth-num">${i+1}</td>
        <td><span class="addr" title="${item.address}" onclick="copyAddr('${item.address}')">${item.address.slice(0,12)}…${item.address.slice(-6)}</span></td>
        <td>${item.entity_name?`<span class="badge badge-personal">${item.entity_name}</span>`:'<span style="color:var(--text-dim)">—</span>'}</td>
        <td><span class="badge badge-chain">${item.chain}</span></td>
        <td class="depth-num">${item.depth}</td>
        <td class="depth-num" style="color:var(--accent)">${item.tx_cnt||'—'}</td>
        <td><a href="https://intel.arkm.com/explorer/address/${item.address}" target="_blank" rel="noopener" style="color:var(--blue);font-size:10px;text-decoration:none">↗</a></td>
      </tr>
    `).join('');
  }
}
function copyAddr(addr){navigator.clipboard.writeText(addr).catch(()=>{});}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

// ── 다운로드 ──
function ts(){return new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);}
function dlFile(content,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}
function downloadCSV(type){
  if(type==='deposits'){
    const rows=Object.values(_deposits).map(d=>`${d.address},${d.entity_name},"${(d.chains||[]).join('|')}",${d.tx_cnt||''},${d.source||''}`);
    dlFile(['address,entity_name,chains,tx_cnt,source',...rows].join('\n'),`deposits_${ts()}.csv`,'text/csv');
  }else if(type==='personal'){
    const rows=Object.values(_personal).map(p=>`${p.address},${p.entity_name||''},${p.entity_type||''},${p.chain},${p.depth},${p.tx_cnt||''},${p.via_exchange||''}`);
    dlFile(['address,entity_name,entity_type,chain,depth,tx_cnt,via_exchange',...rows].join('\n'),`personal_${ts()}.csv`,'text/csv');
  }else{
    const dRows=Object.values(_deposits).map(d=>`${d.address},${d.entity_name},"${(d.chains||[]).join('|')}",${d.tx_cnt||''},${d.source||''}`);
    const pRows=Object.values(_personal).map(p=>`${p.address},${p.entity_name||''},${p.entity_type||''},${p.chain},${p.depth},${p.tx_cnt||''},${p.via_exchange||''}`);
    dlFile(['# 거래소 입금 주소','address,entity_name,chains,tx_cnt,source',...dRows,'','# 개인 지갑','address,entity_name,entity_type,chain,depth,tx_cnt,via_exchange',...pRows].join('\n'),`all_${ts()}.csv`,'text/csv');
  }
}
function downloadJSON(type){
  const data=type==='deposits'?Object.values(_deposits):Object.values(_personal);
  dlFile(JSON.stringify(data,null,2),`${type}_${ts()}.json`,'application/json');
}
function downloadAll(){
  dlFile(JSON.stringify({meta:{timestamp:new Date().toISOString(),credit_used:_client?.creditUsed||0},exchange_deposits:Object.values(_deposits),personal_wallets:Object.values(_personal)},null,2),`full_result_${ts()}.json`,'application/json');
}
function downloadDiagLog(){
  const t=document.getElementById('terminal');
  const lines=t?[...t.querySelectorAll('.log-line')].map(el=>el.textContent):[];
  dlFile(['SurfTracer v3.0 진단 로그',`생성: ${new Date().toLocaleString('ko-KR')}`,`Credit: ${_client?.creditUsed||0}`,`거래소: ${Object.keys(_deposits).length}  개인: ${Object.keys(_personal).length}`,'─'.repeat(60),...lines].join('\n'),`diag_log_${ts()}.txt`,'text/plain');
}
function downloadFullDiag(){
  const t=document.getElementById('terminal');
  const lines=t?[...t.querySelectorAll('.log-line')].map(el=>el.textContent):[];
  dlFile(JSON.stringify({meta:{timestamp:new Date().toISOString(),credit_used:_client?.creditUsed||0,deposits:Object.keys(_deposits).length,personal:Object.keys(_personal).length},exchange_deposits:Object.values(_deposits),personal_wallets:Object.values(_personal),credit_log:_client?.creditLog||[],error_log:_client?.errorLog||[],terminal_log:lines},null,2),`full_diag_${ts()}.json`,'application/json');
}

(function(){
  const key=localStorage.getItem('sft_key');
  const proxy=localStorage.getItem('sft_proxy');
  if(key)document.getElementById('apiKey').value=key;
  if(proxy)document.getElementById('proxyUrl').value=proxy;
  addWalletEntry();
})();
